apiVersion: apps/v1
kind: Deployment
metadata:
  name: playground
spec:
  selector:
    matchLabels:
      app: playground
  replicas: 1
  template:
    metadata:
      labels:
        app: playground
    spec:
      containers:
      - name: playground
        image: wil42/playground:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8888
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: playground-service
spec:
  selector:
    app: playground
  ports:
  - port: 8888
    targetPort: 8888
  type: ClusterIP

---
  apiVersion: networking.k8s.io/v1
  kind: Ingress
  metadata:
    name: playground-ingress
    namespace: dev
  spec:
    rules:
    - host: playground.local
      http:
        paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: playground-service
              port:
                number: 80